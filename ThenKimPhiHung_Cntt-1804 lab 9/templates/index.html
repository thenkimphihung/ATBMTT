<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DNU RSA CRYPTO SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    <style>
        :root { --p-green: #0f0; --p-cyan: #0ff; --bg: #000; }
        body { background: var(--bg); color: var(--p-green); font-family: 'Consolas', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { max-width: 1000px; margin: auto; z-index: 1; }
        .panel { background: rgba(10, 10, 10, 0.9); border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .title { color: var(--p-cyan); font-weight: bold; border-bottom: 1px solid #222; margin-bottom: 10px; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; color: var(--p-green); padding: 8px; margin: 5px 0; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-family: inherit; margin: 10px 0; border: 1px solid var(--p-cyan); background: #002222; color: var(--p-cyan); }
        button:hover { background: #004444; }
        .btn-red { border-color: #f00; color: #f00; background: #200; }
        .inbox { height: 150px; overflow-y: auto; background: #050505; border: 1px solid #222; padding: 10px; font-size: 0.9rem; }
        .msg-line { border-bottom: 1px solid #111; padding: 5px 0; }
    </style>
</head>
<body>
    <canvas id="m"></canvas>
    <div class="container">
        <h1 style="text-align:center; text-shadow: 0 0 10px #0f0;">ĐẠI NAM UNIVERSITY - ATTT LAB 9</h1>
        
        <div class="panel">
            <div class="title">[ 1. IDENTITY MANIFESTATION ]</div>
            <input type="text" id="user" placeholder="ENTER YOUR NAME">
            <button onclick="conn()">ESTABLISH CONNECTION</button>
            <textarea id="priv" placeholder="PRIVATE KEY (PR)"></textarea>
        </div>

        <div class="panel">
            <div class="title">[ 2. CIPHERSTREAM ORIGINATION ]</div>
            <select id="target"></select>
            <textarea id="msg">DNU SECURE DOCUMENT - LAB 9</textarea>
            <button class="btn-red" onclick="send()">INITIATE RSA ENCRYPTION</button>
        </div>

        <div class="panel">
            <div class="title">[ 3. DECRYPTION CHAMBER ]</div>
            <button style="border-color:#0f0; color:#0f0; background:#020;" onclick="recv()">CHECK & DECRYPT INBOX</button>
            <div id="inbox" class="inbox"></div>
        </div>
    </div>

    <script>
        // Matrix Effect
        const c=document.getElementById('m'), x=c.getContext('2d');
        c.height=window.innerHeight; c.width=window.innerWidth;
        const s="01".split(""), f=12, cols=c.width/f, d=[];
        for(let i=0; i<cols; i++) d[i]=1;
        function draw(){ x.fillStyle="rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height); x.fillStyle="#0f0"; x.font=f+"px arial";
            d.forEach((y, i)=>{ const t=s[Math.floor(Math.random()*s.length)]; x.fillText(t,i*f,y*f); if(y*f>c.height&&Math.random()>0.975) d[i]=0; d[i]++; });
        } setInterval(draw, 35);

        // RSA Logic
        const js = new JSEncrypt({default_key_size: 1024});
        let me = "";

        async function conn() {
            me = document.getElementById('user').value;
            if(!me) return alert("ENTER NAME!");
            js.getKey();
            document.getElementById('priv').value = js.getPrivateKey();
            await fetch('/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: me, public_key: js.getPublicKey()}) });
            alert("CONNECTED TO 172.16.67.198");
            updateUsers();
        }

        async function updateUsers() {
            const r = await fetch('/users');
            const u = await r.json();
            const s = document.getElementById('target');
            s.innerHTML = "";
            for(let name in u) if(name !== me) s.innerHTML += `<option value='${u[name]}'>DEST: ${name}</option>`;
        }

        async function send() {
            const pub = document.getElementById('target').value;
            if(!pub) return alert("NO RECIPIENT!");
            const targetName = document.getElementById('target').options[document.getElementById('target').selectedIndex].text.replace("DEST: ","");
            const enc = new JSEncrypt(); enc.setPublicKey(pub);
            const cipher = enc.encrypt(document.getElementById('msg').value);

            await fetch('/send', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({to: targetName, ciphertext: cipher}) });
            alert("SENT!");
        }

        async function recv() {
            const r = await fetch(`/receive/${me}`);
            const msgs = await r.json();
            const box = document.getElementById('inbox');
            box.innerHTML = "";
            const dec = new JSEncrypt(); dec.setPrivateKey(document.getElementById('priv').value);
            msgs.forEach(m => {
                const txt = dec.decrypt(m.ciphertext);
                box.innerHTML += `<div class='msg-line'><span style='color:#0ff'>[RECEIVE]:</span> ${txt || "DECRYPT_ERR"}</div>`;
            });
        }
        setInterval(updateUsers, 3000);
    </script>
</body>
</html>
